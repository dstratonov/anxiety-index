name: Score Companies & Deploy

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      discover:
        description: 'Run company discovery (otherwise only scores)'
        type: boolean
        default: false
      batch_size:
        description: 'Companies to score in this run'
        type: string
        default: '15'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  score-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: npm install

      # Monday or manual trigger with discover=true: discover companies
      - name: Check if Monday
        id: day
        run: echo "dow=$(date -u +%u)" >> $GITHUB_OUTPUT

      - name: Discover top IT companies
        if: steps.day.outputs.dow == '1' || (github.event_name == 'workflow_dispatch' && inputs.discover == true)
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node discover.js --count 100

      # Daily: score a batch of unscored companies
      - name: Score daily batch
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BATCH_SIZE="${{ github.event.inputs.batch_size || '15' }}"
          node batch-score.js --batch-size "$BATCH_SIZE" --max-searches 10

      # Generate frontend data from accumulated results
      - name: Generate frontend data
        working-directory: pipeline
        run: node build-frontend-data.js

      # Commit updated pipeline data back to repo
      - name: Commit pipeline data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/companies.json pipeline/company-meta.json pipeline/results.json src/data/companies.js || true
          git diff --staged --quiet || git commit -m "Update Evil Index scores [automated]"
          git push || true

      - name: Install frontend dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
